name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit || true
      - run: pnpm build

  deploy-info:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - run: |
          echo "✅ Build passed!"
          echo "🚀 Auto-deploy watcher picks up changes within 30 seconds"
          echo "🌐 Dashboard: https://dash.zuhudo.cc.cd"
